<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Primary SEO -->
  <title>FamilyCart – Shared Shopping List for Families</title>
  <meta name="description" content="FamilyCart is a real-time shared shopping list app for families. Create a room, share the code, and shop together — everyone sees every change instantly." />
  <meta name="keywords" content="shared shopping list, family shopping app, real-time grocery list, collaborative shopping, grocery list app" />
  <meta name="author" content="FamilyCart" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://familycart.app/" />

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn previews) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://familycart.app/" />
  <meta property="og:title" content="FamilyCart – Shared Shopping List for Families" />
  <meta property="og:description" content="Create a shared shopping list room, invite your family with a code, and shop together in real time." />
  <meta property="og:image" content="https://familycart.app/og-image.png" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="FamilyCart – Shared Shopping List for Families" />
  <meta name="twitter:description" content="Real-time shared grocery lists for the whole family. Join a room and shop together." />
  <meta name="twitter:image" content="https://familycart.app/og-image.png" />

  <!-- PWA / mobile -->
  <meta name="theme-color" content="#16a34a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FamilyCart" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/js/main.jsx"></script>
</body>
</html>
